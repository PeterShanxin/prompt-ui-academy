name: Bug report
description: Report a reproducible problem in the learning experience.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Prompt UI Academy. Please do not include private information.
  - type: input
    id: route
    attributes:
      label: Route
      description: Which page has the problem?
      placeholder: /dictionary
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Edge 150 on Windows 11
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or additional context
      description: Drag in screenshots if they help, after removing private information.
